<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    padding:0;
    background:transparent;
    overflow:hidden;
    font-family:'Tajawal', Tahoma, sans-serif;
}

.banner{
    position:fixed;
    top:8px;

    left:-340px;

    width:310px;
    height:72px;

    /* ألوان جديدة تعبّر عن الانطلاقة (بنفسجي/أزرق عصري) */
    background:linear-gradient(135deg,#6C3CE1,#3A1C8C);

    border-radius:18px;

    display:flex;
    align-items:center;

    padding:0 15px;

    color:white;

    box-shadow:0 5px 18px rgba(0,0,0,0.35);

    animation:slide 7s infinite;

    text-decoration:none;
}

.logo{
    width:48px;
    height:48px;

    border-radius:50%;

    background:white;

    display:flex;
    justify-content:center;
    align-items:center;

    margin-left:12px;

    font-size:26px;
}

.text h3{
    margin:0;
    font-size:16px;
}

.text p{
    margin:4px 0 0;
    font-size:12px;
    opacity:0.95;
}

@keyframes slide{

    0%{
        left:-340px;
        opacity:0;
    }

    10%{
        left:10px;
        opacity:1;
    }

    75%{
        left:10px;
        opacity:1;
    }

    100%{
        left:360px;
        opacity:0;
    }
}
</style>
</head>

<body>

<a class="banner"
target="_blank"
href="https://whatsapp.com/channel/0029VbCa4oUBA1evhpkGvr3I">

    <div class="logo">
        🚀
    </div>

    <div class="text">
        <h3>🚀 انطلاقة GMube الجديدة</h3>

        <p>
            انضم لمجموعة الواتساب الآن ✨
        </p>
    </div>

</a>

</body>
</html>
