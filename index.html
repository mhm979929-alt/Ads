<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تجربة WebView</title>

  <style>
    body{
      margin:0;
      padding:0;
      font-family:Tahoma;
      background:#111827;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      width:90%;
      max-width:350px;
      background:#1f2937;
      padding:25px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 0 20px rgba(0,0,0,0.4);
    }

    h1{
      color:#00d4ff;
    }

    p{
      opacity:0.8;
    }

    button{
      margin-top:20px;
      border:none;
      padding:12px 25px;
      border-radius:12px;
      background:#00d4ff;
      color:black;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      transform:scale(1.05);
    }

    #result{
      margin-top:20px;
      color:#22c55e;
      font-size:18px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>مرحبا محمد 👋</h1>

    <p>
      هذه صفحة HTML تعمل داخل WebView
    </p>

    <button onclick="showMessage()">
      اضغط هنا
    </button>

    <div id="result"></div>
  </div>

  <script>
    function showMessage(){
      document.getElementById("result").innerHTML =
      "تم الضغط على الزر بنجاح 🚀";
    }
  </script>

</body>
</html>
