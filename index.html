<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    padding:0;
    background:transparent;
    overflow:hidden;
    font-family:Tahoma;
}

/* البانر */
.banner{
    position:fixed;

    /* ارفعه أو نزله من هنا */
    top:10px;

    left:-320px;
    width:300px;
    height:70px;

    background:linear-gradient(135deg,#00d4ff,#2563eb);

    border-radius:18px;
    display:flex;
    align-items:center;
    padding:0 15px;

    color:white;
    box-shadow:0 5px 20px rgba(0,0,0,0.35);

    animation:slide 6s infinite;
}

/* الصورة */
.logo{
    width:45px;
    height:45px;
    border-radius:50%;
    background:white;
    margin-left:12px;
}

/* النص */
.text h3{
    margin:0;
    font-size:17px;
}

.text p{
    margin:3px 0 0;
    font-size:13px;
    opacity:0.9;
}

/* الحركة */
@keyframes slide{

    0%{
        left:-320px;
        opacity:0;
    }

    10%{
        left:10px;
        opacity:1;
    }

    70%{
        left:10px;
        opacity:1;
    }

    100%{
        left:350px;
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="banner">

    <div class="logo"></div>

    <div class="text">
        <h3>القرآن حياة</h3>
        <p>مرحبا بك داخل التطبيق ✨</p>
    </div>

</div>

</body>
</html>
